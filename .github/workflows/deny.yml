name: cargo-deny
on:
  workflow_dispatch:
  pull_request:
    paths: ['Cargo.toml', 'Cargo.lock', 'deny.toml']
  push:
    branches: [main]
    paths: ['Cargo.toml', 'Cargo.lock', 'deny.toml']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable

      # `deny.toml` lives in this repo (local override > org baseline), so the
      # reusable cross-repo workflow is unnecessary here. We run cargo-deny
      # inlined with the same pinned action SHAs that the org reusable used.
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v6
        with:
          rust-version: stable
          command: check advisories
          manifest-path: ./Cargo.toml
